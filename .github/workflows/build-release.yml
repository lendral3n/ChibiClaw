name: Build & Release APK

# Trigger: setiap push ke main (termasuk hasil merge PR)
on:
  push:
    branches: [ main ]

# Izin untuk membuat GitHub Release dan upload asset
permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # butuh full history untuk hitung build number

      # ── 2. JDK 17 ──────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle permission ────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 4. Ambil versi dari build.gradle.kts ───────────────────────
      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | grep -oP '"\K[^"]+')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | grep -oP '\d+')
          TAG="v${VERSION_NAME}-build.${{ github.run_number }}"
          APK_NAME="ChibiClaw-${VERSION_NAME}-build${{ github.run_number }}.apk"
          echo "version_name=$VERSION_NAME"   >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE"   >> $GITHUB_OUTPUT
          echo "tag=$TAG"                     >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME"           >> $GITHUB_OUTPUT

      # ── 5. Decode keystore (opsional — skip jika secret tidak ada) ──
      #
      # Setup secrets di GitHub repo:
      #   Settings → Secrets → Actions → New repository secret
      #
      #   KEYSTORE_BASE64   → isi keystore (.jks) di-encode base64
      #                       cara encode: base64 -w 0 chibiclaw.jks
      #   STORE_PASSWORD    → password keystore
      #   KEY_ALIAS         → alias key di dalam keystore
      #   KEY_PASSWORD      → password key
      #
      # Kalau secrets belum diset, APK tetap di-build tapi unsigned.
      # APK unsigned masih bisa di-sideload (install manual).
      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "${{ runner.temp }}/chibiclaw.jks"
            echo "keystore_path=${{ runner.temp }}/chibiclaw.jks" >> $GITHUB_OUTPUT
            echo "signing=true" >> $GITHUB_OUTPUT
            echo "Keystore decoded — APK akan di-sign"
          else
            echo "signing=false" >> $GITHUB_OUTPUT
            echo "Secrets belum diset — APK akan unsigned (tetap bisa di-sideload)"
          fi

      # ── 6. Build Release APK ────────────────────────────────────────
      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # ── 7. Rename APK ───────────────────────────────────────────────
      - name: Rename APK
        run: |
          APK_DIR="app/build/outputs/apk/release"
          APK_FILE=$(ls "$APK_DIR"/*.apk | head -1)
          mv "$APK_FILE" "$APK_DIR/${{ steps.version.outputs.apk_name }}"
          echo "APK: $APK_DIR/${{ steps.version.outputs.apk_name }}"

      # ── 8. Upload artifact (backup — selalu ada walau release gagal) ─
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      # ── 9. Buat GitHub Release + attach APK ─────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ChibiClaw v${{ steps.version.outputs.version_name }} — Build #${{ github.run_number }}"
          body: |
            ## ChibiClaw v${{ steps.version.outputs.version_name }}

            **Build:** #${{ github.run_number }}
            **Commit:** `${{ github.sha }}`
            **Signed:** ${{ steps.keystore.outputs.signing }}

            ---

            ### Cara Install
            1. Download APK di bawah (`Assets` → `ChibiClaw-*.apk`)
            2. Di HP: **Settings → Security → Install unknown apps** → aktifkan untuk browser/file manager yang kamu pakai
            3. Buka file APK → Install

            ### Update dari versi lama
            Cukup install APK baru di atas versi lama — data tidak hilang.

            ---

            ### Commit message
            ```
            ${{ github.event.head_commit.message }}
            ```
          files: app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          draft: false
          prerelease: false
          make_latest: true
