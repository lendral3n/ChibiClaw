name: Release — Build & Publish APK

# Trigger:
#  - Push tag `v*` (mis. `v4.0.0`, `v4.0.0-alpha`, `v4.1.0-beta`)
#  - Atau manual via Actions UI (workflow_dispatch)
#
# Phase 0-9 dev period: TIDAK auto-trigger per commit (terlalu sering).
# Phase 9 polish onwards: Lendra tag manual `git tag v4.0.0 && git push --tags`
# untuk trigger release proper.
#
# CI verify per commit handled di ci.yml.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v4.0.0-alpha)'
        required: true
        default: 'v4.0.0-alpha'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version info
        id: version
        run: |
          # Resolve version tag: dari git tag kalau push tag, else dari input dispatch.
          TAG_REF="${{ github.ref_name }}"
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            TAG="$INPUT_VERSION"
          else
            TAG="$TAG_REF"
          fi
          # Strip leading "v" untuk versionName comparison
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | grep -oP '"\K[^"]+')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | grep -oP '\d+')
          APK_NAME="ChibiClaw-${VERSION_NAME}-build${{ github.run_number }}.apk"
          echo "version_name=$VERSION_NAME"  >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE"  >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                    >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME"          >> "$GITHUB_OUTPUT"

      # ── Decode keystore (opsional) ──────────────────────────────────
      #
      # Set secrets di GitHub repo: Settings → Secrets → Actions
      #   KEYSTORE_BASE64   → output: base64 chibiclaw.jks
      #                       cara: base64 -w 0 chibiclaw.jks > keystore.base64
      #   STORE_PASSWORD    → password keystore
      #   KEY_ALIAS         → alias key di keystore
      #   KEY_PASSWORD      → password key
      #
      # Kalau secrets belum diset, APK tetap di-build unsigned (tetap bisa
      # sideload manual).
      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "${{ runner.temp }}/chibiclaw.jks"
            echo "keystore_path=${{ runner.temp }}/chibiclaw.jks" >> "$GITHUB_OUTPUT"
            echo "signing=true" >> "$GITHUB_OUTPUT"
            echo "Keystore decoded — APK akan di-sign"
          else
            echo "signing=false" >> "$GITHUB_OUTPUT"
            echo "Secrets belum di-set — APK akan unsigned (tetap bisa di-sideload)"
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          APK_DIR="app/build/outputs/apk/release"
          APK_FILE=$(ls "$APK_DIR"/*.apk | head -1)
          mv "$APK_FILE" "$APK_DIR/${{ steps.version.outputs.apk_name }}"
          echo "APK: $APK_DIR/${{ steps.version.outputs.apk_name }}"

      - name: Compute SHA256
        id: sha
        run: |
          APK="app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          SHA=$(shasum -a 256 "$APK" | awk '{print $1}')
          SIZE=$(du -h "$APK" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE"  >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ChibiClaw ${{ steps.version.outputs.tag }} — Build #${{ github.run_number }}"
          body: |
            ## ChibiClaw ${{ steps.version.outputs.tag }}

            **versionName:** `${{ steps.version.outputs.version_name }}`
            **versionCode:** `${{ steps.version.outputs.version_code }}`
            **Build:** `#${{ github.run_number }}`
            **Commit:** `${{ github.sha }}`
            **Signed:** `${{ steps.keystore.outputs.signing }}`
            **Size:** `${{ steps.sha.outputs.size }}`
            **SHA-256:** `${{ steps.sha.outputs.sha256 }}`

            ---

            ### Cara install

            1. Download APK di bawah (`Assets` → `ChibiClaw-*.apk`)
            2. Di HP: **Settings → Apps → Special access → Install unknown apps**
               → aktifkan untuk browser / file manager
            3. Buka file APK → Install
            4. Untuk update versi lama: install di atas — data tidak hilang

            ### Commit message terakhir

            ```
            ${{ github.event.head_commit.message }}
            ```

            ---

            ⚠️ Phase 0-9 dev release. Belum production-grade.
            Detail per phase di [`docs/architecture/`](https://github.com/lendral3n/ChibiClaw/tree/main/docs/architecture).
          files: app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          make_latest: ${{ !contains(steps.version.outputs.tag, '-') }}
