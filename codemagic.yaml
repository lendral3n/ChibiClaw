workflows:
  # =====================================================================
  # NOTE: Codemagic adalah alternative CI. Primary CI = GitHub Actions
  # (.github/workflows/ci.yml + build-release.yml).
  #
  # Kalau kamu cuma pakai GitHub Actions, file ini bisa di-ignore (tetap
  # safe di repo). Kalau mau aktifkan Codemagic, set environment variables
  # di App Settings → Environment variables → group `signing_credentials`
  # (lihat docs di bawah).
  # =====================================================================

  android-release:
    name: ChibiClaw — Release Build
    max_build_duration: 60

    # Trigger: tag push v*. Phase 0-9 dev: tidak auto per commit, manual tag.
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    environment:
      java: 17
      groups:
        - signing_credentials

    scripts:
      - name: Build Release APK
        script: |
          if [ -n "$CM_KEYSTORE" ]; then
            echo "$CM_KEYSTORE" | base64 --decode > "$CM_BUILD_DIR/chibiclaw.jks"
            export KEYSTORE_PATH="$CM_BUILD_DIR/chibiclaw.jks"
            export STORE_PASSWORD="$CM_KEYSTORE_PASSWORD"
            export KEY_ALIAS="$CM_KEY_ALIAS"
            export KEY_PASSWORD="$CM_KEY_PASSWORD"
            echo "Keystore siap — APK akan di-sign"
          else
            echo "Signing credentials tidak ditemukan — build unsigned APK"
          fi
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        script: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"\K[^"]+')
          APK_DIR="app/build/outputs/apk/release"
          APK_FILE=$(ls "$APK_DIR"/*.apk | head -1)
          NEW_NAME="$APK_DIR/ChibiClaw-${VERSION}-build${BUILD_NUMBER}.apk"
          mv "$APK_FILE" "$NEW_NAME"
          echo "APK: $NEW_NAME"

      - name: Create GitHub Release
        script: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "GITHUB_TOKEN belum di-set — skip create release (artifact tetap tersedia di Codemagic)"
            exit 0
          fi
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"\K[^"]+')
          APK_FILE=$(ls app/build/outputs/apk/release/ChibiClaw-*.apk | head -1)
          APK_NAME=$(basename "$APK_FILE")
          TAG="${CM_TAG:-v${VERSION}-build${BUILD_NUMBER}}"

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"$TAG\",
              \"name\": \"ChibiClaw $TAG\",
              \"body\": \"Build via Codemagic. Commit: \`${CM_COMMIT}\`\",
              \"draft\": false,
              \"prerelease\": true
            }" \
            "https://api.github.com/repos/$CM_REPO_SLUG/releases")

          UPLOAD_URL=$(echo "$RESPONSE" | grep -o '"upload_url": "[^"]*"' | grep -o 'https://[^{]*')
          if [ -z "$UPLOAD_URL" ]; then
            echo "Gagal buat GitHub Release. Response: $RESPONSE"
            exit 1
          fi

          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$APK_FILE" \
            "${UPLOAD_URL}?name=${APK_NAME}"

          echo "GitHub Release berhasil: $TAG"

    artifacts:
      - app/build/outputs/apk/release/ChibiClaw-*.apk

    publishing: {}

# ═══════════════════════════════════════════════════════════════════════
# SETUP CODEMAGIC DASHBOARD (kalau mau aktifkan)
# ═══════════════════════════════════════════════════════════════════════
#
# App Settings → Environment variables → group: signing_credentials
#
#   Variable             | Isi                               | Secure?
#   ---------------------|-----------------------------------|--------
#   CM_KEYSTORE          | base64 chibiclaw.jks              | YES ✓
#   CM_KEYSTORE_PASSWORD | password keystore                 | YES ✓
#   CM_KEY_ALIAS         | chibiclaw                         | YES ✓
#   CM_KEY_PASSWORD      | password key                      | YES ✓
#   GITHUB_TOKEN         | GitHub Personal Access Token      | YES ✓
#
# Cara buat GITHUB_TOKEN:
#   github.com → Settings → Developer settings →
#   Personal access tokens → Tokens (classic) → Generate new token
#   Centang scope: repo (full)
# ═══════════════════════════════════════════════════════════════════════
